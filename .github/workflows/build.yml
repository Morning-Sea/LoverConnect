name: 打包APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: 赋予执行权限
        run: chmod +x gradlew
        
      - name: 开始打包Debug版APK
        run: ./gradlew assembleDebug
        
      - name: 上传APK文件
        uses: actions/upload-artifact@v4
        with:
          name: 我的安装包
          path: app/build/outputs/apk/debug/*.apk
